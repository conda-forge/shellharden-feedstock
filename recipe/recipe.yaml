context:
  version: "4.3.2"

package:
  name: shellharden
  version: ${{ version }}

source:
  url: https://github.com/anordal/shellharden/archive/v${{ version }}.tar.gz
  sha256: 3a6721c3409c70449c24a5b33f83d0d05026f2318fe052db5c6d0834e2b29c6c

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - shellharden --help

about:
  license: MPL-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Bash syntax highlighter that encourages/fixes variables quoting
  homepage: https://github.com/anordal/shellharden
  repository: https://github.com/anordal/shellharden

extra:
  recipe-maintainers:
    - danielnachun
